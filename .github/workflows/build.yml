name: build pipeline

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Instalar Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Instalar dependências
        run: npm install

      - name: Rodar lint
        run: npm run lint
        continue-on-error: true

      - name: Build do projeto
        run: npm run build

      - name: Upload do build
        uses: actions/upload-artifact@v4
        with:
          name: react-build
          path: dist
